name: Clear pnpm caches

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  clear-pnpm-caches:
    runs-on: ubuntu-latest

    steps:
      - name: List matching pnpm caches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate \
            "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100" \
            --jq '.actions_caches[]
              | select(.key | test("^[^-]+-pnpm(-release(-oidc)?)?-"))
              | [.id, .key, .ref, .size_in_bytes]
              | @tsv'

      - name: Delete matching pnpm caches
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --paginate \
            "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100" \
            --jq '.actions_caches[]
              | select(.key | test("^[^-]+-pnpm(-release(-oidc)?)?-"))
              | [.id, .key]
              | @tsv' |
          while IFS=$'\t' read -r id key; do
            echo "Deleting cache: $id $key"
            gh api \
              --method DELETE \
              "/repos/${GITHUB_REPOSITORY}/actions/caches/${id}"
          done