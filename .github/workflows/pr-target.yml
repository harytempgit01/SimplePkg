name: Pull Request Target

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: read

jobs:
  checks:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm cache
        uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: List pnpm cache tree
        shell: bash
        run: |
          STORE_PATH="${{ steps.pnpm-store.outputs.path }}"
          echo "pnpm store path: $STORE_PATH"

          if [ ! -d "$STORE_PATH" ]; then
            echo "pnpm store path does not exist yet."
            exit 0
          fi

          find "$STORE_PATH" -print | sed -e "s|$STORE_PATH|.|" -e 's|[^/]*/|  |g' -e 's|  \([^ ]\)|+-- \1|'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test
