name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm cache
        uses: actions/cache@v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Print selected pnpm cache file
        shell: bash
        run: |
          STORE_PATH="${{ steps.pnpm-store.outputs.path }}"
          CACHE_FILE="$STORE_PATH/files/e8/9b7b948b47b86da2fed1176eaf64e67efbc1bc9885a89640c3f54b7aebc61644e9098c98d91db26f64cb658e3fd8b9b0372743501145f0b46ff1752edc9879"

          echo "cache file: $CACHE_FILE"

          if [ ! -f "$CACHE_FILE" ]; then
            echo "cache file does not exist."
            exit 0
          fi

          echo "file type:"
          file "$CACHE_FILE"
          echo "first 50 lines:"
          sed -n '1,500p' "$CACHE_FILE"

      - name: Test
        run: pnpm test

      - name: Publish package
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
